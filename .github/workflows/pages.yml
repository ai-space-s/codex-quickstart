name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Node 먼저 + pnpm 캐시를 lockfile 기준으로 사용
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      # 2) pnpm 을 PATH에 설치/활성화 (이 스텝이 없으면 지금 같은 에러가 납니다)
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # 3) 락파일 존재 가드(명확한 실패 메시지)
      - name: Ensure pnpm lockfile is present
        run: test -f pnpm-lock.yaml

      # 4) 의존성 설치/빌드
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # 5) SPA 새로고침 404 방지(선택 권장)
      - run: cp dist/index.html dist/404.html

      # 6) Pages artifact 업로드
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
